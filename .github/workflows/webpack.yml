name: NodeJS 与 Webpack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: 使用 Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: 安装依赖
      run: npm ci

    - name: 构建
      run: npm run build

    - name: 验证构建输出
      run: |
        echo "检查构建输出文件..."
        ls -la dist/
        if [ -f "dist/bundle.js" ]; then
          echo "✓ bundle.js 存在"
        else
          echo "✗ bundle.js 不存在"
          exit 1
        fi
        if [ -f "dist/styles.css" ]; then
          echo "✓ styles.css 存在"
        else
          echo "✗ styles.css 不存在"
          exit 1
        fi
        if [ -f "dist/index.html" ]; then
          echo "✓ index.html 存在"
        else
          echo "✗ index.html 不存在"
          exit 1
        fi
